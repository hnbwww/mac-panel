<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mac Panel - 连接测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .test-section {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #1890ff;
        }
        .status {
            padding: 10px 20px;
            border-radius: 4px;
            margin: 10px 0;
        }
        .success {
            background: #f6ffed;
            border: 1px solid #b7eb8f;
            color: #52c41a;
        }
        .error {
            background: #fff2f0;
            border: 1px solid #ffccc7;
            color: #ff4d4f;
        }
        .loading {
            background: #e6f7ff;
            border: 1px solid #91d5ff;
            color: #1890ff;
        }
        button {
            background: #1890ff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }
        button:hover {
            background: #40a9ff;
        }
        pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
        .console-output {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 4px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
        }
        .console-line {
            margin: 2px 0;
        }
        .console-error {
            color: #f48771;
        }
        .console-warn {
            color: #cca700;
        }
        .console-info {
            color: #75beff;
        }
    </style>
</head>
<body>
    <h1>🔧 Mac Panel 连接测试</h1>

    <div class="test-section">
        <h2>API 连接测试</h2>
        <button onclick="testHealth()">测试后端连接</button>
        <button onclick="testLogin()">测试登录</button>
        <button onclick="testSystemInfo()">测试系统信息</button>
        <div id="api-status"></div>
    </div>

    <div class="test-section">
        <h2>浏览器控制台</h2>
        <div class="console-output" id="console-output"></div>
    </div>

    <div class="test-section">
        <h2>环境配置</h2>
        <pre id="env-config"></pre>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:3001';

        // 拦截 console 输出
        const consoleOutput = document.getElementById('console-output');
        const originalConsole = {
            log: console.log,
            error: console.error,
            warn: console.warn,
            info: console.info
        };

        function addConsoleLine(message, type = 'log') {
            const line = document.createElement('div');
            line.className = `console-line console-${type}`;
            line.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            consoleOutput.appendChild(line);
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        }

        console.log = (...args) => {
            originalConsole.log(...args);
            addConsoleLine(args.join(' '), 'info');
        };

        console.error = (...args) => {
            originalConsole.error(...args);
            addConsoleLine(args.join(' '), 'error');
        };

        console.warn = (...args) => {
            originalConsole.warn(...args);
            addConsoleLine(args.join(' '), 'warn');
        };

        console.info = (...args) => {
            originalConsole.info(...args);
            addConsoleLine(args.join(' '), 'info');
        };

        function showStatus(message, type) {
            const statusDiv = document.getElementById('api-status');
            const statusClass = type === 'error' ? 'error' : type === 'loading' ? 'loading' : 'success';
            statusDiv.innerHTML = `<div class="status ${statusClass}">${message}</div>`;
        }

        async function testHealth() {
            showStatus('正在测试后端连接...', 'loading');
            try {
                const response = await fetch(`${API_BASE_URL}/health`);
                const data = await response.json();
                showStatus(`✅ 后端连接成功: ${data.message}`, 'success');
                console.log('后端健康检查:', data);
            } catch (error) {
                showStatus(`❌ 后端连接失败: ${error.message}`, 'error');
                console.error('后端连接错误:', error);
            }
        }

        async function testLogin() {
            showStatus('正在测试登录...', 'loading');
            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: 'admin',
                        password: 'admin123'
                    })
                });
                const data = await response.json();

                if (data.token) {
                    showStatus(`✅ 登录成功! Token: ${data.token.substring(0, 20)}...`, 'success');
                    localStorage.setItem('test_token', data.token);
                    console.log('登录成功:', data);

                    // 测试带 Token 的请求
                    testAuthRequest(data.token);
                } else {
                    showStatus('❌ 登录失败: 未收到 Token', 'error');
                }
            } catch (error) {
                showStatus(`❌ 登录失败: ${error.message}`, 'error');
                console.error('登录错误:', error);
            }
        }

        async function testAuthRequest(token) {
            try {
                const response = await fetch(`${API_BASE_URL}/api/system/summary`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                const data = await response.json();
                console.log('系统信息:', data);
            } catch (error) {
                console.error('认证请求错误:', error);
            }
        }

        async function testSystemInfo() {
            const token = localStorage.getItem('test_token');
            if (!token) {
                showStatus('❌ 请先登录', 'error');
                return;
            }

            showStatus('正在获取系统信息...', 'loading');
            try {
                const response = await fetch(`${API_BASE_URL}/api/system/summary`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                const data = await response.json();

                const info = `
                    <pre>
CPU 使用率: ${data.cpu.usage}%
核心数: ${data.cpu.cores}
内存使用率: ${data.memory.usage}%
磁盘使用率: ${data.disk.usage}%
网络接口: ${data.network.interfaces}
                    </pre>
                `;
                showStatus(`✅ 系统信息获取成功${info}`, 'success');
                console.log('系统摘要:', data);
            } catch (error) {
                showStatus(`❌ 获取系统信息失败: ${error.message}`, 'error');
                console.error('系统信息错误:', error);
            }
        }

        // 显示环境配置
        document.getElementById('env-config').textContent = `
前端地址: ${window.location.origin}
后端地址: ${API_BASE_URL}
WebSocket: ${API_BASE_URL.replace('http', 'ws')}
User Agent: ${navigator.userAgent}
平台: ${navigator.platform}
语言: ${navigator.language}
        `.trim();

        // 页面加载时自动测试
        window.onload = () => {
            console.log('🚀 测试页面已加载');
            console.log('📡 后端地址:', API_BASE_URL);
            testHealth();

            // 检查浏览器兼容性
            console.log('🔍 检查浏览器兼容性...');

            // 检查 Fetch API
            if (typeof fetch !== 'undefined') {
                console.log('✅ Fetch API 支持');
            } else {
                console.error('❌ Fetch API 不支持');
            }

            // 检查 LocalStorage
            try {
                localStorage.setItem('test', 'test');
                localStorage.removeItem('test');
                console.log('✅ LocalStorage 支持');
            } catch (e) {
                console.error('❌ LocalStorage 不支持:', e);
            }

            // 检查 WebSocket
            if (typeof WebSocket !== 'undefined') {
                console.log('✅ WebSocket 支持');
            } else {
                console.error('❌ WebSocket 不支持');
            }

            // 检查 Promise
            if (typeof Promise !== 'undefined') {
                console.log('✅ Promise 支持');
            } else {
                console.error('❌ Promise 不支持');
            }
        };
    </script>
</body>
</html>
